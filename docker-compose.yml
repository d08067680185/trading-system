services:
  trading:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET=${BINANCE_SECRET:-}
      - BINANCE_SPOT_API_KEY=${BINANCE_SPOT_API_KEY:-}
      - BINANCE_SPOT_SECRET=${BINANCE_SPOT_SECRET:-}
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_SECRET=${OKX_SECRET:-}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE:-}
      - OKX_SPOT_API_KEY=${OKX_SPOT_API_KEY:-}
      - OKX_SPOT_SECRET=${OKX_SPOT_SECRET:-}
      - OKX_SPOT_PASSPHRASE=${OKX_SPOT_PASSPHRASE:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TRADING_API_KEY=${TRADING_API_KEY:-}
      # Restrict CORS: set to "https://yourdomain.com" in production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - trading-data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  trading-data:
